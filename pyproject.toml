[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
timeout = 20
timeout_method = "thread"

[tool.mypy]
python_version = "3.12"  # plan.md §3 の下限（numpy 2.x の型スタブが3.12+構文のため）
packages = ["server"]
strict = false
check_untyped_defs = true
warn_unused_ignores = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["faster_whisper.*", "llama_cpp.*", "ctranslate2.*", "transformers.*"]
ignore_missing_imports = true  # 型スタブ未提供
