# LinguaBridge 設定（plan.md §5 のスキーマ骨子に準拠）
server:
  http_port: 8000            # 生徒用（平文HTTP）
  https_port: 8443           # 先生用（自己署名TLS。#16 運用パッケージで有効化）
  cert_dir: certs/

models:
  # OneDrive同期の影響を受けない場所に置く（plan.md R-08）。環境変数は展開される
  dir: "%LOCALAPPDATA%/LinguaBridge/models"

asr:
  engine: faster-whisper     # "faster-whisper" | "fake"（テスト・デモ用）
  # 判断ゲート①で確定（docs/bench/2026-07-07-bench.md）: kotoba はCPUではデコードに
  # 発話長によらず約6秒かかり予算超過のため、既定は small。
  # 値は models.dir 配下のディレクトリ名（切替: kotoba-whisper-v2.0-faster）
  model: faster-whisper-small
  compute_type: int8
  language: ja

vad:
  engine: silero             # "silero" | "energy"（energyはテスト・フォールバック用）
  threshold: 0.5             # silero: 音声確率 0..1 / energy: int16 RMS
  min_silence_ms: 500        # 発話終了判定
  max_utterance_s: 30        # 強制分割（plan.md E-03）
  pre_roll_ms: 240           # 発話開始前の音声を含める長さ（語頭の欠け防止）

mt:
  # "fake" は決定的フェイク（#10 トレーサー用）。#12 で hy-mt2 / nllb 実装を追加。
  # 実装後の既定は hy-mt2 — 判断ゲート①で確定（docs/bench/2026-07-07-bench.md:
  # 品質・ライセンスで優位、遅延+164ms・メモリ+1.2GBはいずれも予算内）
  engine: fake
  decided_engine: hy-mt2   # 判断ゲート①の確定値（#12 実装完了時に engine へ昇格）
  # パスは models.dir からの相対
  hy_mt2: { gguf_path: hy-mt2/Hy-MT2-1.8B-Q4_K_M.gguf, threads: 4 }
  nllb: { model_dir: nllb-200-distilled-600M-ct2, tokenizer_dir: nllb-tokenizer, beam_size: 1 }

languages: # 生徒が選択可能な言語（F-12）
  - { code: en, label: English }
  - { code: zh, label: 中文（简体） }

recording:
  default_on: false
  out_dir: sessions/

history_resend: 50
