<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinguaBridge - 授業字幕</title>
  <link rel="stylesheet" href="/static/student.css">
</head>
<body>
  <section id="join-screen">
    <h1>LinguaBridge</h1>
    <p class="lead">先生の話す内容が、選んだ言語の字幕で表示されます。</p>
    <label for="code-input">参加コード（4桁）</label>
    <input id="code-input" inputmode="numeric" autocomplete="off" maxlength="4" placeholder="0000">
    <p class="label">言語 / Language / 语言</p>
    <div id="lang-options"></div>
    <button id="join-btn" disabled>参加する / Join / 加入</button>
    <p id="join-error" class="error" hidden></p>
  </section>

  <section id="caption-screen" class="size-m" hidden>
    <header>
      <span id="session-banner" class="banner idle">…</span>
      <div class="header-controls">
        <label class="ja-toggle">
          <input type="checkbox" id="ja-toggle" checked>
          <span id="ja-toggle-label" data-i18n="show_ja"></span>
        </label>
        <div id="size-buttons" role="group">
          <button data-size="s" data-i18n="size_s"></button>
          <button data-size="m" data-i18n="size_m"></button>
          <button data-size="l" data-i18n="size_l"></button>
        </div>
        <select id="lang-select" title="Language"></select>
      </div>
    </header>
    <main id="cards"></main>
    <button id="latest-btn" data-i18n="latest" hidden></button>
  </section>

  <script src="/static/i18n.js"></script>
  <script src="/static/student.js"></script>
</body>
</html>
