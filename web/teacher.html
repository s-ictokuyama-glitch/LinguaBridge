<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaBridge — 先生用</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main>
      <h1>LinguaBridge — 先生用</h1>

      <div id="relay-warning" class="notice warn hidden">
        中継 URL が未設定です。README の手順で GAS をデプロイし、設定してください。
      </div>

      <section id="setup" class="panel">
        <p>ルームを作成すると、生徒が参加するための QR コードが表示されます。</p>
        <button id="create-room">ルームを作成</button>
      </section>

      <section id="room" class="panel hidden">
        <p style="text-align: center; margin: 0">ルームコード</p>
        <div id="room-code" class="room-code"></div>
        <div class="qr-wrap"><canvas id="qr"></canvas></div>
        <p class="student-url" id="student-url"></p>
        <button id="close-room" class="secondary">ルームを終了する</button>
      </section>

      <section id="compose" class="panel hidden">
        <p>話す内容を入力して Enter で配信します（音声認識はスライス2で追加予定）。</p>
        <div class="compose-row">
          <input type="text" id="text-input" placeholder="日本語の文を入力…" autocomplete="off" />
          <button id="send">送信</button>
        </div>
        <p id="send-status"></p>
        <ul class="sent-log" id="sent-log"></ul>
      </section>
    </main>
    <script type="module" src="./src/teacher/main.ts"></script>
  </body>
</html>
