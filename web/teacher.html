<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinguaBridge - 先生ページ</title>
  <link rel="stylesheet" href="/static/teacher.css">
</head>
<body>
  <h1>LinguaBridge 先生ページ</h1>
  <p id="page-error" class="error" hidden></p>

  <div class="columns">
    <section class="panel" id="join-panel">
      <h2>生徒の参加方法</h2>
      <div id="qr"></div>
      <p class="code-label">参加コード</p>
      <p id="join-code" class="code">----</p>
      <p id="join-url" class="url"></p>
      <p class="hint">QRを読むか、URLを開いてコードを入力してもらってください。</p>
    </section>

    <section class="panel">
      <h2>配信</h2>
      <p>状態: <span id="session-state" class="state">未開始</span></p>
      <div class="controls">
        <button id="start-btn" disabled>開始</button>
        <button id="pause-btn" disabled>一時停止</button>
        <button id="end-btn" disabled>終了</button>
      </div>

      <div class="meter-row">
        <span class="meter-label">マイク入力</span>
        <div id="mic-meter"><div id="mic-meter-bar"></div></div>
      </div>
      <p id="mic-status" class="hint">「開始」を押すとマイクの許可を求めます。</p>
      <p id="silence-warning" class="warn" hidden></p>
      <p id="overload-warning" class="warn" hidden>
        処理が追いついていません。ゆっくり話すか一呼吸置いてください
      </p>

      <h2>状況</h2>
      <ul id="stats">
        <li>接続生徒数: <span id="stat-students">0</span></li>
        <li>言語内訳: <span id="stat-langs">—</span></li>
        <li>処理キュー深度: <span id="stat-queue">0</span></li>
        <li>遅延中央値: <span id="stat-delay">0</span> ms</li>
      </ul>

      <h2>文字起こし（日本語）</h2>
      <ul id="transcript"></ul>
    </section>
  </div>

  <script src="/static/vendor/qrcode.min.js"></script>
  <script src="/static/teacher.js"></script>
</body>
</html>
